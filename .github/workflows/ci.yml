name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    # app 壳依赖 objc2/AppKit,只能在 macOS 上编译/测试。
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) + rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace

  # 供应链检查:许可证白名单 + RustSec 漏洞 + 禁用/重复版本/来源。
  # cargo-deny 的 advisories 检查与 cargo-audit 同源(都读 RustSec 库),已覆盖其职责,
  # 故不再单独跑 cargo-audit。只需读 Cargo.lock,放 ubuntu 上与 macos 并行,更快。
  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
